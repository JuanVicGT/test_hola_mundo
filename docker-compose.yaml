version: '3'

services:
  jenkins:
    build: .
    container_name: jenkins
    privileged: true # Da acceso a los dispositivos del host (opcional pero ayuda con docker.sock)
    user: root 
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home2:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # Esto asegura que el contenedor se reinicie si falla
    restart: unless-stopped

volumes:
  jenkins_home2: